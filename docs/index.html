<!DOCTYPE html>
<html>
<head>
  <title>GGGM Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F4F6F9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; }
    .navbar { background: #3F51B5; color: white; margin-bottom: 30px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .btn-primary { background: #3F51B5; border: none; }
    .btn-primary:hover { background: #303F9F; }
    .status-msg { font-size: 14px; font-weight: 500; margin-top: 10px; }
    #song-list { max-height: 600px; overflow-y: auto; }
  </style>
</head>
<body>
  <nav class="navbar"><div class="container"><strong>GGGM Master Cloud Panel</strong></div></nav>
  
  <div class="container pb-5">
    <div id="login-sec">
      <div class="card p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center mb-4">Admin Login</h3>
        <input type="password" id="pass" class="form-control mb-3" placeholder="Enter Password">
        <button class="btn btn-primary w-100" onclick="checkLogin()">Login</button>
      </div>
    </div>

    <div id="dash-sec" style="display:none;">
      <div class="row">
        <div class="col-md-5">
          <!-- Add Single Song -->
          <div class="card p-4 mb-4">
            <h4>Add Single Song</h4>
            <input type="text" id="title" class="form-control mb-2" placeholder="Song Title">
            <select id="lang" class="form-select mb-2">
              <option value="tamil">Tamil</option>
              <option value="telugu">Telugu</option>
            </select>
            <textarea id="lyrics" class="form-control mb-2" rows="10" placeholder="Paste Lyrics Here..."></textarea>
            <button class="btn btn-primary w-100" onclick="uploadSingle()">UPLOAD TO CLOUD</button>
            <div id="status" class="status-msg text-center"></div>
          </div>

          <!-- Bulk Upload -->
          <div class="card p-4 mb-4" style="background: #E8EAF6;">
            <h4>Bulk Upload Magic</h4>
            <p class="small text-muted">Select multiple .txt files. Titles will be taken from filenames.</p>
            <input type="file" id="bulk-files" class="form-control mb-2" multiple accept=".txt,.pdf">
            <button class="btn btn-success w-100" onclick="uploadBulk()">RUN BULK UPLOAD</button>
            <div id="bulk-status" class="status-msg text-center text-success"></div>
          </div>
        </div>

        <div class="col-md-7">
           <div class="card p-4">
             <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Manage Cloud Songs</h4>
                <button class="btn btn-sm btn-outline-secondary" onclick="loadSongs()">Refresh List</button>
             </div>
             <div id="song-list-container">
                <div id="song-list">Loading songs from cloud...</div>
             </div>
           </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://gggm-admin.myntra-tracker-123.workers.dev";
    let authPass = "";

    function checkLogin() {
      const p = document.getElementById('pass').value;
      if (p === "admin") {
        authPass = p;
        document.getElementById('login-sec').style.display = 'none';
        document.getElementById('dash-sec').style.display = 'block';
        loadSongs();
      } else { alert("Wrong password!"); }
    }

    async function uploadSingle() {
      const status = document.getElementById('status');
      const title = document.getElementById('title').value;
      const lyrics = document.getElementById('lyrics').value;
      const lang = document.getElementById('lang').value;

      if (!title || !lyrics) { alert("Title and Lyrics are required!"); return; }

      status.innerText = "Processing...";
      status.className = "status-msg text-primary";

      try {
        const res = await fetch(`${API_BASE}/upload`, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, language: lang, lyrics, number: "" }) 
        });
        
        if (res.ok) { 
           status.innerText = "Success! Song is live.";
           status.className = "status-msg text-success";
           document.getElementById('title').value = "";
           document.getElementById('lyrics').value = "";
           loadSongs();
        } else { throw new Error("Server error"); }
      } catch (e) {
         status.innerText = "Upload failed. Check connection.";
         status.className = "status-msg text-danger";
      }
    }

    async function uploadBulk() {
      const fileInput = document.getElementById('bulk-files');
      const status = document.getElementById('bulk-status');
      const files = fileInput.files;

      if (files.length === 0) { alert("Select files first!"); return; }

      status.innerText = `Starting upload of ${files.length} files...`;
      
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const title = file.name.replace(/\.[^/.]+$/, ""); // Remove extension
        
        const reader = new FileReader();
        reader.onload = async (e) => {
          const lyrics = e.target.result;
          const lang = title.toLowerCase().includes("telugu") ? "telugu" : "tamil";

          try {
            await fetch(`${API_BASE}/upload`, { 
              method: 'POST', 
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title, language: lang, lyrics, number: "" }) 
            });
            status.innerText = `Uploaded [${i+1}/${files.length}]: ${title}`;
            if (i === files.length - 1) {
              status.innerText = "Bulk upload complete!";
              loadSongs();
            }
          } catch(err) { console.error("Bulk error", err); }
        };
        reader.readAsText(file);
      }
    }

    async function loadSongs() {
      const list = document.getElementById('song-list');
      try {
        const res = await fetch(`${API_BASE}/songs`);
        const songs = await res.json();
        if (songs.length === 0) { list.innerHTML = "No songs found in cloud."; return; }
        
        list.innerHTML = songs.map(s => `
          <div class="d-flex justify-content-between border-bottom py-2 align-items-center">
            <div style="max-width: 80%;">
              <div class="fw-bold">${s.title}</div>
              <small class="text-muted">${s.language.toUpperCase()}</small>
            </div>
            <button class="btn btn-sm btn-outline-danger" onclick="delSong('${s.id}', '${s.title}')">Delete</button>
          </div>
        `).join('');
      } catch (e) {
        list.innerHTML = "Error loading songs. Please refresh.";
      }
    }

    async function delSong(id, title) {
      if(!confirm(`Permanently delete "${title}"?`)) return;
      try {
        await fetch(`${API_BASE}/delete`, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({id}) 
        });
        loadSongs();
      } catch(e) { alert("Delete failed."); }
    }
  </script>
</body>
</html>
