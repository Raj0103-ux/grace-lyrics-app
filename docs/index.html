<!DOCTYPE html>
<html>
<head>
  <title>GGGM Admin Dashboard (Firebase)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F4F6F9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; }
    .navbar { background: #3F51B5; color: white; margin-bottom: 30px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .btn-primary { background: #3F51B5; border: none; }
    .btn-primary:hover { background: #303F9F; }
    .status-msg { font-size: 14px; font-weight: 500; margin-top: 10px; }
    #song-list { max-height: 600px; overflow-y: auto; }
  </style>
</head>
<body>
  <nav class="navbar"><div class="container"><strong>GGGM Master Cloud Panel (Firebase Live)</strong></div></nav>
  
  <div class="container pb-5">
    <div id="login-sec">
      <div class="card p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center mb-4">Admin Login</h3>
        <input type="password" id="pass" class="form-control mb-3" placeholder="Enter Password">
        <button class="btn btn-primary w-100" onclick="checkLogin()">Login</button>
      </div>
    </div>

    <div id="dash-sec" style="display:none;">
      <div class="row">
        <div class="col-md-5">
          <!-- Add Single Song -->
          <div class="card p-4 mb-4">
            <h4>Add Single Song</h4>
            <input type="text" id="title" class="form-control mb-2" placeholder="Song Title">
            <select id="lang" class="form-select mb-2">
              <option value="tamil">Tamil</option>
              <option value="telugu">Telugu</option>
            </select>
            <textarea id="lyrics" class="form-control mb-2" rows="10" placeholder="Paste Lyrics Here..."></textarea>
            <button class="btn btn-primary w-100" onclick="uploadSingle()">UPLOAD TO FIREBASE</button>
            <div id="status" class="status-msg text-center"></div>
          </div>

          <!-- Bulk Upload -->
          <div class="card p-4 mb-4" style="background: #E8EAF6;">
            <h4>Firebase Bulk Upload Magic</h4>
            <p class="small text-muted">1. Select Language. 2. Choose .txt files.</p>
            <select id="bulk-lang" class="form-select mb-3" style="border: 2px solid #3F51B5; font-weight: bold;">
              <option value="tamil">SAVE AS: TAMIL</option>
              <option value="telugu">SAVE AS: TELUGU</option>
            </select>
            <input type="file" id="bulk-files" class="form-control mb-2" multiple accept=".txt">
            <button class="btn btn-success w-100" onclick="uploadBulk()">START BULK UPLOAD</button>
            <div id="bulk-status" class="status-msg text-center text-success"></div>
          </div>
        </div>

        <div class="col-md-7">
           <div class="card p-4">
             <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Firebase Songs Library</h4>
                <button class="btn btn-sm btn-outline-secondary" onclick="loadSongs()">Refresh List</button>
             </div>
             <div id="song-list-container">
                <div id="song-list">Loading from Firebase...</div>
             </div>
           </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // FIREBASE CONFIG
    const PROJECT_ID = "grace-lyrics-admin";
    const API_BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/songs`;
    
    let authPass = "";

    function checkLogin() {
      const p = document.getElementById('pass').value;
      if (p === "admin") {
        authPass = p;
        document.getElementById('login-sec').style.display = 'none';
        document.getElementById('dash-sec').style.display = 'block';
        loadSongs();
      } else { alert("Wrong password!"); }
    }

    async function uploadSingle() {
      const status = document.getElementById('status');
      const title = document.getElementById('title').value;
      const lyrics = document.getElementById('lyrics').value;
      const lang = document.getElementById('lang').value;

      if (!title || !lyrics) { alert("Title and Lyrics are required!"); return; }

      status.innerText = "Connecting to Firebase...";
      status.className = "status-msg text-primary";

      try {
        const sid = Date.now().toString();
        const body = {
          fields: {
            title: { stringValue: title },
            language: { stringValue: lang },
            lyrics: { stringValue: lyrics }
          }
        };

        const res = await fetch(`${API_BASE}?documentId=${sid}`, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body) 
        });
        
        if (res.ok) { 
           status.innerText = "Success! Saved to Firebase.";
           status.className = "status-msg text-success";
           document.getElementById('title').value = "";
           document.getElementById('lyrics').value = "";
           loadSongs();
        } else { throw new Error("Firebase error"); }
      } catch (e) {
         status.innerText = "Upload failed. Check Firebase Rules.";
         status.className = "status-msg text-danger";
      }
    }

    async function uploadBulk() {
      const fileInput = document.getElementById('bulk-files');
      const status = document.getElementById('bulk-status');
      const langSelector = document.getElementById('bulk-lang');
      const selectedLang = langSelector.value;
      const files = fileInput.files;

      if (files.length === 0) { alert("Select files first!"); return; }

      status.innerText = `Preparing ${files.length} songs for ${selectedLang.toUpperCase()}...`;
      
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const title = file.name.replace(/\.[^/.]+$/, "");
        
        const reader = new FileReader();
        reader.onload = async (e) => {
          const lyrics = e.target.result;
          const sid = `${Date.now()}_${i}`;

          try {
            const body = {
              fields: {
                title: { stringValue: title },
                language: { stringValue: selectedLang },
                lyrics: { stringValue: lyrics }
              }
            };
            await fetch(`${API_BASE}?documentId=${sid}`, { 
              method: 'POST', 
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body) 
            });
            status.innerText = `Uploaded [${i+1}/${files.length}]: ${title} (${selectedLang})`;
            if (i === files.length - 1) {
              status.innerText = "Bulk upload to Firebase complete!";
              loadSongs();
            }
          } catch(err) { console.error("Firebase Bulk Error", err); }
        };
        reader.readAsText(file);
      }
    }

    async function loadSongs() {
      const list = document.getElementById('song-list');
      try {
        const res = await fetch(API_BASE);
        const data = await res.json();
        const docs = data.documents || [];
        
        if (docs.length === 0) { list.innerHTML = "Firebase collection is empty."; return; }
        
        list.innerHTML = docs.map(doc => {
          const sid = doc.name.split("/").pop();
          const title = doc.fields.title ? doc.fields.title.stringValue : "Untitled";
          const lang = doc.fields.language ? doc.fields.language.stringValue : "tamil";
          return `
            <div class="d-flex justify-content-between border-bottom py-2 align-items-center">
              <div>
                <div class="fw-bold">${title}</div>
                <small class="text-muted">${lang.toUpperCase()}</small>
              </div>
              <button class="btn btn-sm btn-outline-danger" onclick="delSong('${sid}', '${title}')">Delete</button>
            </div>
          `;
        }).join('');
      } catch (e) {
        list.innerHTML = "Error loading from Firebase. Check Rules.";
      }
    }

    async function delSong(id, title) {
      if(!confirm(`Permanently delete "${title}"?`)) return;
      try {
        await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
        loadSongs();
      } catch(e) { alert("Delete failed."); }
    }
  </script>
</body>
</html>
