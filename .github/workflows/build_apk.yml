name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Latest Flet CLI
        run: pip install flet-cli==0.83.1

      - name: Build APK with Sed Replacement
        run: |
          # Create dummy assets to prevent stat errors
          mkdir -p assets
          # Run build but don't exit on error (let name bug happen)
          flet build apk --product gggm --org com.gggm || true
          
          echo "Applying surgically precise Sed Replacement..."
          sed -i 's/name: .*/name: gggm/' build/flutter/pubspec.yaml
          
          cd build/flutter
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/gggm.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grace-lyrics-apk
          path: gggm.apk
