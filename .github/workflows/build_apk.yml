name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Latest Flet CLI
        run: pip install flet-cli==0.83.1

      - name: Build APK with Shielded Workspace
        run: |
          mkdir ../gggm_shield
          cp -r . ../gggm_shield
          cd ../gggm_shield
          flet build apk --project . --product gggm --module-name main
          mv build/apk/gggm.apk ${{ github.workspace }}/gggm.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grace-lyrics-apk
          path: gggm.apk
