name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet==0.81.0 pypdf python-pptx

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK with Flet (Final Shield)
        run: |
          mkdir ../gggm_final
          cp -r . ../gggm_final
          cd ../gggm_final
          flet build apk --project . --product gggm --module-name main
          mv build/apk/gggm.apk ${{ github.workspace }}/gggm.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grace-lyrics-apk
          path: gggm.apk
