name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Flet CLI Stable
        run: pip install flet-cli==0.23.1

      - name: Build APK with Flet
        run: flet build apk --product gggm --org com.gggm

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grace-lyrics-apk
          path: build/apk/*.apk
