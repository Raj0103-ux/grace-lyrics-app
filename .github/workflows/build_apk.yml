name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Flet
        run: pip install flet

      - name: Final Build
        run: |
          # Ensure assets folder exists and contains the icon
          mkdir -p assets
          cp icon.png assets/icon.png || true
          # Retry the build up to 3 times to handle 'RemoteDisconnected' issues
          for i in {1..3}; do
            echo "Starting build attempt $i..."
            flet build apk --project GGGM --org com.grace.lyrics --arch arm64-v8a && exit 0 || echo "Attempt $i failed, retrying in 10s..." && sleep 10
          done
          echo "All build attempts failed."
          exit 1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grace-lyrics-apk
          path: build/apk/*.apk
